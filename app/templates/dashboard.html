<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Dashboard Sistema</title>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    margin: 0;
    padding: 0;
}

header {
    background: #1e293b;
    padding: 15px;
    text-align: center;
    font-size: 20px;
    font-weight: bold;
}

.container {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 15px;
    padding: 20px;
}

.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 10px;
    text-align: center;
}

.value {
    font-size: 28px;
    margin-top: 10px;
    color: #38bdf8;
}

.alert {
    background: #ef4444;
    padding: 10px;
    border-radius: 5px;
    margin: 10px;
    display: none;
    text-align: center;
    font-weight: bold;
}

.chart-container {
    padding: 20px;
}
</style>

</head>

<body>

<header>
Sistema de Monitoramento
</header>

<div class="alert" id="alertBox">
⚠ Alta utilização detectada!
</div>

<div class="container">

    <div class="card">
        <h3>CPU</h3>
        <div class="value" id="cpu">0%</div>
    </div>

    <div class="card">
        <h3>Memória</h3>
        <div class="value" id="mem">0%</div>
    </div>

    <div class="card">
        <h3>Disco</h3>
        <div class="value" id="disk">0%</div>
    </div>

</div>

<div class="chart-container">
    <canvas id="metricsChart"></canvas>
</div>

<script>
let chart;

// =======================
// MÉTRICAS ATUAIS
// =======================
async function updateMetrics() {
    try {
        const response = await fetch('/api/metrics/latest');
        const data = await response.json();

        document.getElementById("cpu").innerText = data.cpu + "%";
        document.getElementById("mem").innerText = data.mem + "%";
        document.getElementById("disk").innerText = data.disk + "%";

        if (data.cpu > 80 || data.mem > 80) {
            document.getElementById("alertBox").style.display = "block";
        } else {
            document.getElementById("alertBox").style.display = "none";
        }

    } catch (err) {
        console.log("Erro updateMetrics", err);
    }
}

// =======================
// HISTÓRICO (GRÁFICO)
// =======================
async function loadHistory() {
    try {
        const res = await fetch('/api/metrics/history');
        const data = await res.json();

        const labels = data.map(d => d.timestamp);
        const cpu = data.map(d => d.cpu);
        const mem = data.map(d => d.mem);
        const disk = data.map(d => d.disk);

        if (chart) {
            chart.destroy();
        }

        const ctx = document.getElementById('metricsChart').getContext('2d');

        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    {
                        label: 'CPU',
                        data: cpu,
                        borderColor: 'red',
                        fill: false
                    },
                    {
                        label: 'MEM',
                        data: mem,
                        borderColor: 'blue',
                        fill: false
                    },
                    {
                        label: 'DISK',
                        data: disk,
                        borderColor: 'green',
                        fill: false
                    }
                ]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: {
                        labels: {
                            color: "#e2e8f0"
                        }
                    }
                },
                scales: {
                    x: {
                        ticks: {
                            color: "#e2e8f0"
                        }
                    },
                    y: {
                        ticks: {
                            color: "#e2e8f0"
                        }
                    }
                }
            }
        });

    } catch (err) {
        console.log("Erro loadHistory", err);
    }
}

// =======================
// LOOP DE ATUALIZAÇÃO
// =======================
setInterval(updateMetrics, 5000);
setInterval(loadHistory, 10000);

updateMetrics();
loadHistory();
</script>

</body>
</html>
