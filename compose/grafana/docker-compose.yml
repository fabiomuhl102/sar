services:

  grafana:
    image: grafana/grafana-oss:latest

    container_name: grafana

    restart: unless-stopped

    ports:
      - "3000:3000"

    volumes:
      - ../../volumes/grafana:/var/lib/grafana

    environment:
      - TZ=America/Sao_Paulo
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123

    networks:
      - automacao

networks:
  automacao:
    external: true
