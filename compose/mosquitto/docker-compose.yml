version: "3.8"

services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    restart: unless-stopped

    ports:
      - "1883:1883"

    volumes:
      - /opt/automacao/volumes/mosquitto/config:/mosquitto/config
      - /opt/automacao/volumes/mosquitto/data:/mosquitto/data
      - /opt/automacao/volumes/mosquitto/log:/mosquitto/log

    command: mosquitto -c /mosquitto/config/mosquitto.conf

    networks:
      - automacao_net

networks:
  automacao_net:
    external: true
